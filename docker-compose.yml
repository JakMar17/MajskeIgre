services:
  decap-server:
    image: node:22-alpine
    working_dir: /app
    command: npx --yes decap-server
    ports:
      - "8081:8081"
    volumes:
      - .:/app
    restart: unless-stopped

  app:
    build:
      context: .
      args:
        NUXT_ENABLE_SCALAR: ${NUXT_ENABLE_SCALAR:-false}
    ports:
      - "1000:3000"
    environment:
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_APP_BASE_URL: ${NUXT_APP_BASE_URL:-/}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "BASE_URL=$${NUXT_APP_BASE_URL:-/}; BASE_URL=$${BASE_URL%/}; wget -qO- \"http://localhost:3000$${BASE_URL}/api/health\" >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
